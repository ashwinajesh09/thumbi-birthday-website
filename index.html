<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Thumbi 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    background:linear-gradient(135deg,#ff6b6b,#6c5ce7,#00cec9);
    font-family:Arial,sans-serif;
    color:white;
    padding:30px 20px;
}

.hidden{
    display:none;
}

.landing{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 60px);
    text-align:center;
    flex-direction:column;
    gap:20px;
}

.landing h2{
    font-size:48px;
    margin-bottom:10px;
    text-shadow:0 0 20px rgba(255,255,255,0.8);
}

.container{
    text-align:center;
    z-index:2;
    max-width:900px;
    margin:0 auto;
}

h1{
    font-size:55px;
    text-shadow:0 0 20px white;
    animation:zoom 1.5s infinite alternate;
    margin-bottom:20px;
}

p{
    font-size:25px;
    margin:20px 0;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:white;
    color:#6c5ce7;
    margin-bottom:25px;
}

button:hover{
    transform:scale(1.1);
}

.photo-gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    margin-top:20px;
}

.photo-card{
    background:rgba(255,255,255,0.15);
    padding:12px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.photo-card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:14px;
    display:block;
}

.fall{
    position:absolute;
    top:-50px;
    font-size:40px;
    animation:fall 5s linear infinite;
}

.dragon-number{
    position:absolute;
    top:-120px;
    font-size:72px;
    font-weight:900;
    letter-spacing:2px;
    color:#ffe066;
    text-shadow:0 0 25px rgba(255,255,255,0.85);
    animation:dragonDrop 4s linear forwards;
    pointer-events:none;
}

@keyframes fall{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(110vh);
    }
}

@keyframes dragonDrop{
    from{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    to{
        transform:translateY(115vh) scale(1.05);
        opacity:0;
    }
}

.dragonfly{
    display:inline-block;
    margin-left:0.35em;
    animation:flyWiggle 1.5s ease-in-out infinite;
}

@keyframes flyWiggle{
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-4px) rotate(15deg); }
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
}

</style>

</head>


<body>

<audio id="song" loop preload="auto" controls>
    <source src="Siddharth_Menon_-_Thumbi_Penne_%28mp3%29.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<div class="landing" id="landingPage">
    <h2>Welcome, Thumbi!</h2>
    <button onclick="openPage()">Open chey thumbi kuttaaa</button>
</div>

<div class="container hidden" id="mainPage">

<h1>
🎉 HAPPY BIRTHDAY<br>
THUMBIIIII MACHANNEEEEEEEE 🎂
</h1>

<p>
❤️ Wishing you happiness, success and unlimited smiles ❤️
</p>

<div class="photo-gallery">
    <div class="photo-card">
        <img src="screenshot1.png" alt="Birthday photo 1">
    </div>
    <div class="photo-card">
        <img src="thumbi8.png" alt="Birthday photo 2">
    </div>
    <div class="photo-card">
        <img src="screenshot3.png" alt="Birthday photo 3">
    </div>
    <div class="photo-card">
        <img src="thmbi7.png" alt="Birthday photo 4">
    </div>
    <div class="photo-card">
        <img src="screenshot5.png" alt="Birthday photo 5">
    </div>
</div>

</div>


<script>
let audio = document.getElementById("song");
function openPage(){
    const landing = document.getElementById("landingPage");
    landing.classList.add("hidden");
    const openButton = landing.querySelector("button");
    if (openButton) {
        openButton.remove();
    }
    document.getElementById("mainPage").classList.remove("hidden");
    playSong();
    showDragonNumber();
}


function playSong(){
    audio.currentTime = 18;
    audio.play().catch(() => {
        alert("Please click the button again after allowing audio.");
    });
}

let emojis=[
"🎊","🎉","🎈","✨","🎁","🥳","❤️"
];


function createPoppers(){

    let item=document.createElement("div");

    item.className="fall";

    item.innerHTML=
    emojis[Math.floor(Math.random()*emojis.length)];

    item.style.left=Math.random()*100+"vw";

    item.style.animationDuration=
    (3+Math.random()*4)+"s";

    item.style.fontSize=
    (25+Math.random()*40)+"px";


    document.body.appendChild(item);


    setTimeout(()=>{
        item.remove();
    },6000);

}

function createDragonNumber(){
    let dragon = document.createElement("div");
    dragon.className = "dragon-number";
    dragon.textContent = "18";
    dragon.style.left = Math.random() * 100 + "vw";
    dragon.style.top = -Math.random() * 120 - 40 + "px";
    dragon.style.animationDuration = (2.5 + Math.random() * 2) + "s";
    dragon.style.fontSize = (60 + Math.random() * 40) + "px";
    document.body.appendChild(dragon);
    setTimeout(() => {
        dragon.remove();
    }, 5200);
}

function showDragonNumber(){
    for (let i = 0; i < 35; i++) {
        setTimeout(createDragonNumber, i * 200);
    }
}

setInterval(createPoppers,200);


</script>

</body>

</html>
